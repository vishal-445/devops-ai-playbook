apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 806148750549.dkr.ecr.ap-south-1.amazonaws.com/gateway:c2f2a93e34025dbd612c420b81f0575048a8629d
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3001"
            - name: AUTH_SERVICE_URL
              value: "http://auth:3002"
            - name: PRODUCTS_SERVICE_URL
              value: "http://product-service:3003"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3004"
            - name: ORDERS_SERVICE_URL
              value: "http://orders:3005"
            - name: USERS_SERVICE_URL
              value: "http://user-service:3006"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: boutique
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
