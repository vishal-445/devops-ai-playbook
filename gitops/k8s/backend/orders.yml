apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: 806148750549.dkr.ecr.ap-south-1.amazonaws.com/orders:d7302858bd02a2d489516eb75bc582c2934e5f36
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3005"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: ORDERS_DB_URL

---

apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: boutique
spec:
  selector:
    app: orders
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
  type: ClusterIP
